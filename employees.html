<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HR Planner | Employees</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles.extras.css" />
  <link rel="stylesheet" href="styles.nav.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <div class="logo">HR</div>
      <div><div style="font-weight:700">HR Planner</div></div>
    </div>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="employees.html" class="nav-link">Employees</a>
      <a href="attendance.html" class="nav-link">Attendance</a>
      <a href="tasks.html" class="nav-link">Tasks</a>
      <a href="jobs.html" class="nav-link">Jobs</a>
      <a href="candidates.html" class="nav-link">Candidates</a>
      <a href="notifications.html" class="nav-link">Notifications</a>
      <button id="themeToggle" class="nav-button">🌙</button>
      <button class="nav-button" onclick="logout()">Logout</button>
    </nav>
  </header>

  <main class="container">
    <h2>Employees</h2>

    <div class="search-bar">
      <div class="row" style="flex:1">
        <input id="empSearch" type="search" placeholder="Search by name or ID" />
        <select id="empDeptFilter"><option value="">All Departments</option></select>
        <button id="clearFilters" class="btn small ghost">Clear</button>
      </div>
      <a href="#add" class="btn small">Add Employee</a>
    </div>

    <table aria-label="Employees" style="margin-top:12px;">
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Department</th><th>Role</th><th>Contact</th><th>Joining</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="employeesTable"></tbody>
    </table>

    <hr style="margin:20px 0" />

    <h3 id="add">Add / Edit Employee</h3>
    <form id="employeeForm">
      <div class="row">
        <input id="empId" placeholder="(auto) ID" />
        <input id="empName" placeholder="Full name" required />
      </div>
      <div class="row">
        <input id="empDept" placeholder="Department" />
        <input id="empRole" placeholder="Role/Title" />
      </div>
      <div class="row">
        <input id="empContact" placeholder="Contact email or phone" />
        <input id="empJoining" type="date" placeholder="Joining date" />
      </div>
      <button type="submit" class="btn">Save</button>
    </form>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
