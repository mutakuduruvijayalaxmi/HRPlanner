<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HR Planner | Attendance</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles.extras.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">
      <div class="logo">HR</div>
      <div><div style="font-weight:700">HR Planner</div></div>
    </div>
    <nav class="nav-links" aria-label="Main navigation">
      <a href="dashboard.html">Dashboard</a>
      <a href="employees.html">Employees</a>
      <a href="attendance.html">Attendance</a>
      <a href="tasks.html">Tasks</a>
      <a href="jobs.html">Jobs</a>
      <a href="candidates.html">Candidates</a>
      <a href="notifications.html">Notifications</a>
      <button id="themeToggle">🌙</button>
      <button class="btn small ghost" onclick="logout()">Logout</button>
    </nav>
  </header>

  <main class="container">
    <h2>Attendance</h2>

    <section style="margin-bottom:16px;">
      <form id="attendanceForm" class="row" style="align-items:center;">
        <input id="attEmpId" placeholder="Employee ID (e.g. E001)" required />
        <input id="attDate" type="date" required />
        <select id="attStatus">
          <option>Present</option>
          <option>Absent</option>
          <option>On Leave</option>
        </select>
        <button class="btn small" type="submit">Log</button>
      </form>
    </section>

    <table aria-label="Attendance history">
      <thead><tr><th>Employee</th><th>Date</th><th>Status</th></tr></thead>
      <tbody id="attendanceTable"></tbody>
    </table>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
